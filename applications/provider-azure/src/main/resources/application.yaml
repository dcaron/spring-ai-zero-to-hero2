
spring:
  application:
    name: azure
  config:
    import: "optional:classpath:/creds.yaml"
  profiles:
    active: #pgvector
  ai:
    openai:
      chat:
        options:
          temperature: 0.7
management:
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: OFF
    org:
      springframework:
        ai: DEBUG


---
spring:
  config:
    activate:
      on-profile: pgvector
  datasource:
    url: jdbc:postgresql://localhost:15432/azure
    username: postgres
    password: password
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimension: 1536
