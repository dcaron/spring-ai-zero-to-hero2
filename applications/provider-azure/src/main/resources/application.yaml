
spring:
  config:
    import: "optional:classpath:/creds.yaml"
  profiles:
    active: #pgvector
  ai:
    azure:
      openai:
        chat:
          options:


            temperature: 0.7
management:
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    org:
      springframework:
        ai: DEBUG

