<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{fragments/layout :: head(${stage.name()})}"></head>
<body>
<div class="app-container">

    <nav th:replace="~{fragments/layout :: sidebar(${activePage})}"></nav>

    <div class="main-wrapper">
        <div th:replace="~{fragments/layout :: topbar(${stage.name()}, ${providerName}, ${activeProfiles})}"></div>

        <div class="main-content">

            <!-- Stage overview strip -->
            <div class="mb-3">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <span class="badge" th:style="'background-color:' + ${stage.accentColor()}"
                          th:text="'Stage ' + ${stage.number()}">Stage</span>
                    <span class="fw-bold" th:text="${stage.name()}">Name</span>
                </div>
                <p class="text-muted small mb-2" th:text="${stage.description()}">description</p>
                <div class="d-flex flex-wrap gap-2 small text-muted">
                    <span><i class="bi bi-hdd-network me-1"></i>Ports: <code>01 stdio</code>, <code>02:8081</code>, <code>04:8082</code>, <code>05:8083</code></span>
                    <span>&middot;</span>
                    <span>Lifecycle: <code>./workshop.sh mcp start|stop|status all</code></span>
                </div>
            </div>

            <!-- Demo cards -->
            <div id="mcp-cards" class="d-flex flex-column gap-3 mb-3">
                <div th:each="demo : ${demos}"
                     th:replace="~{fragments/mcp-card :: card(${demo})}"></div>
            </div>

            <!-- Inspector panel -->
            <div id="mcp-inspector" class="response-panel p-3" style="min-height: 300px;">
                <p class="text-muted text-center mt-4">
                    Click an action button on any demo card to see the result here.
                </p>
            </div>

        </div>
    </div>

</div>

<!-- Documentation Modal -->
<div id="doc-modal" class="doc-modal-overlay" style="display:none" onclick="closeDocModal(event)">
    <div class="doc-modal-content" onclick="event.stopPropagation()">
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2"
             style="border-bottom: 1px solid var(--spring-border);">
            <h5 class="mb-0" style="color: var(--spring-text);">
                <i class="bi bi-journal-code me-2"></i>Documentation
            </h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="closeDocModal()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div id="doc-modal-body" class="markdown-body"></div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/mcp.js}"></script>
</body>
</html>
