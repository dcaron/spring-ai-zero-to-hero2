<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Raw text response -->
<div th:fragment="text-response(body)">
    <pre class="response-text" th:text="${body}">Response text</pre>
</div>

<!-- JSON response -->
<div th:fragment="json-response(body)">
    <pre class="response-json"><code th:text="${body}">{ "key": "value" }</code></pre>
</div>

<!-- Error response -->
<div th:fragment="error-response(message)">
    <div class="text-danger mt-4">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${message}">Error occurred</span>
    </div>
</div>

</html>
