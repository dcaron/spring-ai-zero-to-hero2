<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<!-- ===== HEAD ===== -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap-icons/font/bootstrap-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/workshop.css}"/>
    <title th:text="${title}">Spring AI Workshop</title>
</head>

<!-- ===== SIDEBAR ===== -->
<nav th:fragment="sidebar(activePage)" id="sidebar" class="sidebar">
    <!-- Brand -->
    <div class="brand">
        <span class="brand-icon">&#9752;</span>
        <div class="brand-text">
            <div class="brand-title">Spring AI</div>
            <div class="brand-subtitle">Zero-to-Hero</div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-section">
        <span class="nav-label">Workshop</span>
    </div>

    <a th:href="@{/dashboard}" class="nav-item"
       th:classappend="${activePage == 'dashboard'} ? 'active'">
        <i class="bi bi-grid"></i>
        <span class="nav-label">Dashboard</span>
    </a>

    <div class="nav-divider"></div>
    <div class="nav-section">
        <span class="nav-label">Stages</span>
    </div>

    <a th:href="@{/dashboard/stage/1}" class="nav-item"
       th:classappend="${activePage == 'stage-1'} ? 'active'">
        <i class="bi bi-chat-dots"></i>
        <span class="nav-label">1. Chat</span>
    </a>
    <a th:href="@{/dashboard/stage/2}" class="nav-item"
       th:classappend="${activePage == 'stage-2'} ? 'active'">
        <i class="bi bi-bar-chart"></i>
        <span class="nav-label">2. Embed</span>
    </a>
    <a th:href="@{/dashboard/stage/3}" class="nav-item"
       th:classappend="${activePage == 'stage-3'} ? 'active'">
        <i class="bi bi-database"></i>
        <span class="nav-label">3. Vector</span>
    </a>
    <a th:href="@{/dashboard/stage/4}" class="nav-item"
       th:classappend="${activePage == 'stage-4'} ? 'active'">
        <i class="bi bi-gear"></i>
        <span class="nav-label">4. Pattern</span>
    </a>
    <a th:href="@{/dashboard/stage/5}" class="nav-item"
       th:classappend="${activePage == 'stage-5'} ? 'active'">
        <i class="bi bi-robot"></i>
        <span class="nav-label">5. Agent</span>
    </a>
    <a th:href="@{/dashboard/stage/6}" class="nav-item"
       th:classappend="${activePage == 'stage-6'} ? 'active'">
        <i class="bi bi-plug"></i>
        <span class="nav-label">6. MCP</span>
    </a>

    <div class="nav-divider"></div>
    <div class="nav-section">
        <span class="nav-label">Tools</span>
    </div>

    <a th:href="@{/swagger-ui.html}" target="_blank" class="nav-item">
        <i class="bi bi-journal-code"></i>
        <span class="nav-label">Swagger UI</span>
    </a>
    <a href="http://localhost:3000" target="_blank" class="nav-item">
        <i class="bi bi-graph-up"></i>
        <span class="nav-label">Grafana</span>
    </a>
    <a href="http://localhost:15433" target="_blank" class="nav-item">
        <i class="bi bi-database"></i>
        <span class="nav-label">pgAdmin</span>
    </a>

    <!-- Footer -->
    <div class="sidebar-footer">
        Spring AI 2.0.0-M4
    </div>

    <!-- Toggle button -->
    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
        <i class="bi bi-list"></i>
    </button>
</nav>

<!-- ===== TOPBAR ===== -->
<div th:fragment="topbar(pageTitle, provider, profiles)" class="topbar">
    <h1 th:text="${pageTitle}">Page Title</h1>
    <div class="topbar-right">
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">
            <i class="bi bi-sun-fill theme-icon-light"></i>
            <i class="bi bi-moon-fill theme-icon-dark"></i>
        </button>
        <span class="badge-profile" th:text="${provider}" th:if="${provider}">provider</span>
        <th:block th:each="profile : ${profiles}">
            <span class="badge-profile" th:text="${profile}">profile</span>
        </th:block>
        <span class="health-dot up" title="Application running"></span>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<div th:fragment="scripts">
    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/vendor/htmx/htmx.min.js}"></script>
    <script th:src="@{/vendor/marked/marked.min.js}"></script>
    <script th:src="@{/vendor/highlightjs/highlight.min.js}"></script>
    <script th:src="@{/vendor/highlightjs/languages/java.min.js}"></script>
    <script th:src="@{/vendor/highlightjs/languages/yaml.min.js}"></script>
    <script th:src="@{/vendor/highlightjs/languages/bash.min.js}"></script>
    <script th:src="@{/vendor/highlightjs/languages/xml.min.js}"></script>
    <script th:src="@{/vendor/mermaid/mermaid.min.js}"></script>
    <script>
        var currentTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
        mermaid.initialize({ theme: currentTheme, startOnLoad: false });
        var docMarked = new marked.Marked();
        docMarked.use({
            breaks: true,
            gfm: true,
            renderer: {
                code: function(token) {
                    var text = typeof token === 'string' ? token : (token.text || '');
                    var lang = typeof token === 'string' ? '' : (token.lang || '');
                    if (lang === 'mermaid') {
                        var escaped = text.replace(/"/g, '&quot;');
                        return '<pre class="mermaid" data-original="' + escaped + '">' + text + '</pre>';
                    }
                    try {
                        var highlighted = lang && hljs.getLanguage(lang)
                            ? hljs.highlight(text, { language: lang }).value
                            : hljs.highlightAuto(text).value;
                        return '<pre><code class="hljs language-' + lang + '">' + highlighted + '</code></pre>';
                    } catch(e) {
                        return '<pre><code>' + text + '</code></pre>';
                    }
                }
            }
        });
    </script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/response.js?v=4}"></script>
</div>

</html>
