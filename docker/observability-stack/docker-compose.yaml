# ==============================================================================
# Spring AI Workshop — Observability Stack
# ==============================================================================
# Grafana LGTM (All-in-One): Grafana, Loki (Logs), Tempo (Traces), Mimir (Metrics), OTel Collector
# MailDev: Local email testing
#
# Start: docker compose -f docker/observability-stack/docker-compose.yaml up -d
# Grafana UI: http://localhost:3000 (anonymous admin, no login)
# MailDev UI: http://localhost:1080
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # MailDev — fake SMTP server + web UI for email testing
  # Docs: https://github.com/maildev/maildev
  # ----------------------------------------------------------------------------
  maildev:
    image: maildev/maildev:2.2.1
    container_name: maildev
    environment:
      - MAILDEV_SMTP_PORT=1025
      - MAILDEV_WEB_PORT=1080
    ports:
      - "1080:1080"    # MailDev Web UI
      - "1025:1025"    # SMTP port
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Grafana LGTM Stack (All-in-One Observability)
  # Contains: Grafana, Loki (Logs), Tempo (Traces), Mimir (Metrics), OTel Collector
  # Docs: https://github.com/grafana/docker-otel-lgtm
  # ----------------------------------------------------------------------------
  grafana-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: grafana-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      # Custom dashboards
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom:ro
      # Dashboard provisioning config
      - ./grafana/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/workshop.yaml:ro
      # Disable default LGTM dashboards
      - ./grafana/provisioning/disable-default-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:ro
      # Override default datasource config (trace-to-log correlation using labels)
      - ./grafana/provisioning/datasources/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      org.springframework.boot.service-connection: otel-collector
    restart: unless-stopped

volumes:
  grafana-data:
